services:
  app:
    build: .
    container_name: file-manager-api

    ports:
      - "3008:3008"

    env_file:
      - .env

    depends_on:
      - mongo

    volumes:
      - ./uploads:/app/uploads

    restart: unless-stopped

  mongo:
    image: mongo:8

    container_name: file-manager-mongo

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

    restart: unless-stopped

volumes:
  mongo-data: